# Development overrides — hot-reload mounts.
# These overrides are applied automatically when running `docker compose up` locally.
# In production (IBM-facing deployments), use `docker compose -f docker-compose.yml up`
# to use the production Dockerfile without these overrides.
services:
  api:
    volumes:
      - ./api:/app
      - ./tests:/tests
      - ./Samples:/Samples:ro
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    volumes:
      - ./web/src:/app/src
    # Override the production CMD (npm run preview) with the Vite dev server for local work.
    command: npm run dev
