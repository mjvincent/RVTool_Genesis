name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python dependency audit ────────────────────────────────────────────────
  audit-python:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Python dependencies
        run: pip-audit -r api/requirements.txt --ignore-vuln PYSEC-2024-48

  # ── npm dependency audit ───────────────────────────────────────────────────
  audit-npm:
    name: npm dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate
        working-directory: web

  # ── Python lint ────────────────────────────────────────────────────────────
  lint-python:
    name: Python lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check api/

  # ── Alembic migration chain ────────────────────────────────────────────────
  check-migrations:
    name: Alembic single-head check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Alembic
        run: pip install alembic sqlalchemy asyncpg
      - name: Assert single migration head
        working-directory: api
        run: |
          HEAD_COUNT=$(alembic heads 2>&1 | grep -c '(head)')
          echo "Migration heads found: $HEAD_COUNT"
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 Alembic head, found $HEAD_COUNT."
            echo "Run 'alembic merge heads' locally to resolve before merging."
            alembic heads
            exit 1
          fi
        env:
          # Dummy DB URL — alembic heads only reads migration files, no live DB needed
          DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost/dummy"
          SECRET_KEY: "ci-test-secret-key-not-used-for-encryption-00000000"

  # ── Python tests ───────────────────────────────────────────────────────────
  test-python:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install -r api/requirements.txt
      - name: Run pytest (unit tests only — no live DB required)
        run: pytest tests/test_formula_injection.py tests/test_normalizer_disk_clamping.py tests/test_vpc_profile.py tests/test_model_catalog.py tests/test_upload_guards.py -v
        env:
          # Provide a valid SECRET_KEY so the settings module loads without error
          SECRET_KEY: "ci-test-secret-key-not-used-for-encryption-00000000"

  # ── Frontend typecheck ─────────────────────────────────────────────────────
  typecheck-frontend:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: TypeScript typecheck
        run: npm run typecheck
        working-directory: web
