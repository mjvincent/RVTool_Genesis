name: CI

on:
  push:
    branches: [main, ibm-readiness]
  pull_request:
    branches: [main]

jobs:
  # ── Python lint ────────────────────────────────────────────────────────────
  lint-python:
    name: Python lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff (new files added by this project only)
        # Scope to files introduced/maintained by this project's hardening work.
        # Pre-existing lint issues in other modules are tracked separately.
        run: |
          ruff check \
            api/core/auth.py \
            api/core/config.py \
            api/main.py \
            api/services/export_utils.py \
            api/services/rvtools_generator.py \
            api/services/assumptions_generator.py \
            api/services/vpc_calculator_generator.py \
            api/services/powervs_calculator_generator.py \
            api/routers/settings.py

  # ── Python tests ───────────────────────────────────────────────────────────
  test-python:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install -r api/requirements.txt
      - name: Run pytest (unit tests only — no live DB required)
        run: pytest tests/test_formula_injection.py tests/test_normalizer_disk_clamping.py tests/test_vpc_profile.py tests/test_model_catalog.py -v
        env:
          # Provide a valid SECRET_KEY so the settings module loads without error
          SECRET_KEY: "ci-test-secret-key-not-used-for-encryption-00000000"

  # ── Frontend typecheck ─────────────────────────────────────────────────────
  typecheck-frontend:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: TypeScript typecheck
        run: npm run typecheck
        working-directory: web
